<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<script src="https://code.highcharts.com/highcharts.js"></script>
<script src="https://code.highcharts.com/modules/exporting.js"></script>
<style>
  body{margin:0;padding:0;overflow:hidden;font-family:'Segoe UI',sans-serif;}
  #container{width:100%;height:100%; background-color: #ffffff;}
</style>
</head>
<body>
<div id="container"></div>
<script>
  let chart;
  const tempColor = '#e74c3c'; // Red
  const rpmColor = '#f39c12';  // Orange

  /**
   * Generates Plot Lines with axis-specific color coding and alignment.
   * Temperature markers align left; RPM markers align right.
   */
  function generatePlotLines(config, fieldName) {
    if (!config || !config[fieldName]) return [];
    const cfg = config[fieldName];
    const lines = [];
    
    // Set colors and alignment based on the axis type
    const isTemp = fieldName === 'Temperature';
    const primaryColor = isTemp ? '#e74c3c' : '#f39c12'; 
    const secondaryColor = isTemp ? '#c0392b' : '#d68910';
    const labelAlign = isTemp ? 'left' : 'right';
    const labelX = isTemp ? 10 : -10;

    const targets = [
      { key: 'HH', color: primaryColor, labelText: fieldName + ' HH' },
      { key: 'LL', color: secondaryColor, labelText: fieldName + ' LL' }
    ];

    targets.forEach(t => {
      let val = cfg[t.key];

      // Fallback to search ranges array if direct keys aren't present
      if ((val === undefined || val === null) && cfg.ranges) {
        const found = cfg.ranges.find(r => r.label === t.key);
        if (found) {
          val = (t.key.startsWith('H')) ? (found.from ?? found.to) : (found.to ?? found.from);
        }
      }

      if (val !== undefined && val !== null && !isNaN(parseFloat(val))) {
        const numericVal = parseFloat(val);
        lines.push({
          value: numericVal,
          color: t.color,
          dashStyle: 'Dash',
          width: 2,
          zIndex: 5,
          label: {
            // FIXED: Added .toFixed(2) to round plot line labels
            text: t.labelText + ': ' + numericVal.toFixed(2),
            align: labelAlign,
            x: labelX,
            style: { 
                color: t.color, 
                fontWeight: 'bold',
                backgroundColor: 'rgba(255,255,255,0.7)' 
            }
          }
        });
      }
    });
    return lines;
  }

  function initializeChart(limitsConfig, tempHistory, rpmHistory) {
    const tempLimits = limitsConfig.Temperature || {};
    const rpmLimits = limitsConfig.RPM || {};
    
    chart = Highcharts.chart('container', {
      chart: { 
        type: 'line', 
        zoomType: 'x', 
        marginBottom: 130,
        backgroundColor: '#ffffff'
      },
      title: { text: null },
      time: { useUTC: false },
      xAxis: {
        type: 'datetime',
        labels: {
          useHTML: true, 
          style: { fontSize: '10px', color: '#666', textAlign: 'center' },
          formatter: function() {
            return '<div style="line-height: 1.2;">' + 
                   '<span style="font-size: 9px; color: #888;">' + Highcharts.dateFormat('%d-%m-%Y', this.value) + '</span><br/>' + 
                   '<span style="font-weight: bold; font-size: 11px; color: #333;">' + Highcharts.dateFormat('%H:%M:%S', this.value) + '</span>' +
                   '</div>';
          }
        },
        tickPixelInterval: 140 
      },
      yAxis: [{
        // Temperature Axis (Left)
        title: { text: 'Temperature (' + (tempLimits.units || '°C') + ')', style: { color: tempColor, fontWeight: 'bold' } },
        labels: { style: { color: tempColor } },
        gridLineWidth: 1,
        min: tempLimits.min !== undefined ? tempLimits.min : 30,
        max: tempLimits.max !== undefined ? tempLimits.max : 80,
        plotLines: generatePlotLines(limitsConfig, 'Temperature')
      }, {
        // RPM Axis (Right)
        title: { text: 'RPM', style: { color: rpmColor, fontWeight: 'bold' } },
        labels: { style: { color: rpmColor } },
        opposite: true,
        gridLineWidth: 0,
        min: rpmLimits.min !== undefined ? rpmLimits.min : 0,
        max: rpmLimits.max !== undefined ? rpmLimits.max : 2000,
        plotLines: generatePlotLines(limitsConfig, 'RPM')
      }],
      legend: { 
        enabled: true, 
        verticalAlign: 'top', 
        align: 'center', 
        floating: true, 
        y: 0,
        layout: 'horizontal' 
      },
      tooltip: { shared: true, crosshairs: true },
      credits: { enabled: false },
      plotOptions: { series: { marker: { enabled: false }, turboThreshold: 5000 } },
      series: [
        // FIXED: Added valueDecimals: 2 to both series tooltips
        { name: 'Temperature', color: tempColor, data: tempHistory, tooltip: { valueSuffix: ' °C', valueDecimals: 1 } },
        { name: 'RPM', color: rpmColor, yAxis: 1, data: rpmHistory, tooltip: { valueSuffix: ' RPM', valueDecimals: 1 } }
      ]
    });
  }

  window.addEventListener('message', (e) => {
    const payload = e.data;
    if (!payload) return;

    if (payload.temp_history || payload.rpm_history) {
      initializeChart(payload.limits || {}, payload.temp_history || [], payload.rpm_history || []);
      return;
    }

    if (chart) {
      if (payload.temp) chart.series[0].addPoint(payload.temp, false, true);
      if (payload.rpm) chart.series[1].addPoint(payload.rpm, false, true);
      chart.redraw();
    }
  });
</script>
</body>
</html>
